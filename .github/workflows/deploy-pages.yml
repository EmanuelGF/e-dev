name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Resolve Pages base path
        id: pages-base
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lc="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "$repo_name" | tr '[:upper:]' '[:lower:]')"

          if [[ "$repo_lc" == "$owner_lc.github.io" ]]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$repo_name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        run: npm run build -- --base="${{ steps.pages-base.outputs.base_path }}"

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
