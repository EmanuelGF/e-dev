  <rect x="620" y="242" width="216" height="168" rx="18" fill="#0F172A" stroke="#FF4FD8" stroke-opacity="0.45"/>
  <text x="660" y="312" fill="#FF4FD8" font-size="31" font-family="'Share Tech Mono', Consolas, monospace">Godot</text>
