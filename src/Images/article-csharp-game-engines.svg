<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#201A23"/>
      <stop offset="1" stop-color="#102D2D"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(610 310) rotate(90) scale(300 520)">
      <stop stop-color="#48B7FF" stop-opacity="0.22"/>
      <stop offset="0.46" stop-color="#5ADA5A" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#080C12" stop-opacity="0"/>
    </radialGradient>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36 0 0 0 0 0.86 0 0 0 0 0.36 0 0 0 0.95 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.28 0 0 0 0 0.72 0 0 0 0 1 0 0 0 0.85 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#48B7FF" stroke-opacity="0.08"/>
    </pattern>
    <pattern id="scan" width="1200" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 1H1200" stroke="#FFFFFF" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="28" fill="url(#pulse)"/>
