  <rect width="1200" height="630" rx="28" fill="url(#scan)"/>

  <rect x="84" y="70" width="1032" height="490" rx="28" fill="#080C12" fill-opacity="0.88" stroke="#5ADA5A" stroke-opacity="0.32" stroke-width="2"/>
