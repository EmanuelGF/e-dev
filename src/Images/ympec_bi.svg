    </pattern>
    <pattern id="scan" width="800" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 1H800" stroke="#FFFFFF" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="800" height="480" rx="32" fill="url(#bg)"/>
