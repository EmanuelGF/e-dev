<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#201A23"/>
      <stop offset="1" stop-color="#102D2D"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 300) rotate(90) scale(330 520)">
      <stop stop-color="#48B7FF" stop-opacity="0.26"/>
      <stop offset="0.48" stop-color="#5ADA5A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#080C12" stop-opacity="0"/>
